<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-page">

    <div class="login-container">

        <h1>Escola</h1>

        <div class="tabs">
            <button
                id="btnLogin"
                class="active"
                onclick="mostrarLogin()">
                Login
            </button>

            <button
                id="btnCadastro"
                onclick="mostrarCadastro()">
                Cadastro
            </button>
        </div>

        <div id="login" class="form active">

            <input
                type="email"
                id="loginEmail"
                placeholder="Email"
            >

            <input
                type="password"
                id="loginSenha"
                placeholder="Senha"
            >

            <button
                class="submit"
                onclick="fazerLogin()">
                Entrar
            </button>

        </div>

        <div id="cadastro" class="form">

            <input
                type="text"
                id="cadastroNome"
                placeholder="Nome"
            >

            <input
                type="email"
                id="cadastroEmail"
                placeholder="Email"
            >

            <input
                type="password"
                id="cadastroSenha"
                placeholder="Senha"
            >

            <button
                class="submit"
                onclick="fazerCadastro()">
                Cadastrar
            </button>

        </div>

    </div>

    <script src="../script/script.js"></script>

</body>
</html>
