<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Escola</h2>

        <a href="professor.html">Professores</a>
        <a href="turma.html">Turmas</a>
        <a class="active" href="atividade.html">Atividades</a>
        <a href="index.html">Sair</a>
    </aside>

    <main class="content">

        <div class="card">

            <div class="header">
                <div>
                    <h1>Atividades</h1>
                    <p>Gerencie as atividades das turmas</p>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Descrição</th>
                        <th>ID da Turma</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="atividadesTable"></tbody>
            </table>

            <br>

            <h3>Nova Atividade</h3>

            <label>Título</label>
            <input
                type="text"
                id="titulo"
                placeholder="Título da atividade"
            >

            <label>Descrição</label>
            <input
                type="text"
                id="descricao"
                placeholder="Descrição"
            >

            <label>ID da Turma</label>
            <input
                type="number"
                id="turmaId"
                placeholder="ID da turma"
            >

            <button
                class="btn-primary"
                onclick="cadastrarAtividade()"
            >
                Cadastrar Atividade
            </button>

        </div>

    </main>

</div>

<script src="../script/script.js"></script>

</body>
</html>
